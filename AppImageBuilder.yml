version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: com.pocoguy.Muse
    name: Mixtapes
    icon: com.pocoguy.Muse
    version: latest
    exec: usr/bin/muse

  apt:
    arch: [amd64, arm64]
    allow_unauthenticated: true
    sources:
      - sourceline: "deb [arch=amd64,arm64] http://deb.debian.org/debian/ sid main contrib non-free non-free-firmware"
    include:
      - python3
      - python3-gi
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libadwaita-1-0
      - libgstreamer1.0-0
      - gstreamer1.0-plugins-base
      - nodejs
      - python3-requests
      - python3-urllib3
    exclude:
      - libgcc-s1
      - libstdc++6
      - libselinux1
      - libmount1
      - libblkid1
      - libuuid1

  runtime:
    env:
      PATH: "${APPDIR}/usr/bin:${PATH}"
      # PYTHONPATH will be set correctly by the launcher script
      # But we can provide a sensible default here for development/debugging
      # On Arch, it's typically python3.13 or similar
      PYTHONHOME: "${APPDIR}/usr"
      PYTHONPATH: "${APPDIR}/usr/share/muse:${APPDIR}/usr/lib/python3.13/site-packages:${APPDIR}/usr/lib/python3/dist-packages"

AppImage:
  arch: x86_64
  file_name: "Mixtapes-x86_64.AppImage"
