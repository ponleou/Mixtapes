version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: com.pocoguy.Muse
    name: Mixtapes
    icon: com.pocoguy.Muse
    version: latest
    exec: usr/bin/muse

  pacman:
    packages:
      - python
      - python-gobject
      - gtk4
      - libadwaita
      - gstreamer
      - gst-plugins-base
      - gst-plugins-good
      - nodejs
      - python-requests
      - python-urllib3
      - gobject-introspection-runtime
      - hicolor-icon-theme
    include:
      - python
      - python-gobject
      - gtk4
      - libadwaita
      - gstreamer
      - gst-plugins-base
      - nodejs
      - gobject-introspection-runtime
      - python-requests
      - python-urllib3
    exclude:
      - mesa
      - llvm-libs
      - libdrm
      - wayland
      - vulkan-icd-loader
      - libx11
      - libxcb
      - libxext
      - libxrender
      - libxinerama
      - libxi
      - libxrandr
      - libxcursor
      - libxcomposite
      - libxdamage
      - libxfixes
      - libxkbcommon
      - dbus
      - fontconfig
      - freetype2
      - glibc
      - gcc-libs

  runtime:
    env:
      PATH: "${APPDIR}/usr/bin:${PATH}"
      # PYTHONPATH will be set correctly by the launcher script
      # But we can provide a sensible default here for development/debugging
      # On Arch, it's typically python3.13 or similar
      PYTHONHOME: "${APPDIR}/usr"
      PYTHONPATH: "${APPDIR}/usr/share/muse:${APPDIR}/usr/lib/python3.13/site-packages:${APPDIR}/usr/lib/python3/dist-packages"

AppImage:
  arch: x86_64
  file_name: "Mixtapes-x86_64.AppImage"
