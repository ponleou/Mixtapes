name: Build Flatpak
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build using Flatpak Builder
        run: |
          sudo xvfb-run --auto-servernum flatpak-builder \
            --repo=repo \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --force-clean \
            --default-branch=master \
            --arch=${{ matrix.arch }} \
            flatpak_app com.pocoguy.Muse.yaml
          flatpak build-bundle --arch=${{ matrix.arch }} repo Mixtapes-${{ matrix.arch }}.flatpak com.pocoguy.Muse master
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixtapes-${{ matrix.arch }}-flatpak
          path: Mixtapes-${{ matrix.arch }}.flatpak

  deploy:
    name: Deploy to GitHub Pages
    needs: flatpak
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download all flatpak artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Mixtapes-*-flatpak
          path: downloaded-flatpaks/
          merge-multiple: true

      - name: Install flatpak and ostree
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      - name: Import GPG Key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Create repository and import flatpaks
        run: |
          mkdir -p repo
          ostree init --mode=archive-z2 --repo=repo

          # Export the public key for users to download
          gpg --export --armor ${{ secrets.GPG_KEY_ID }} > repo/mixtapes.gpg

          for f in downloaded-flatpaks/*.flatpak; do
            flatpak build-import-bundle --gpg-sign=${{ secrets.GPG_KEY_ID }} repo "$f"
          done

          # Update repo and generate summary signed with the GPG key
          flatpak build-update-repo --generate-static-deltas --gpg-sign=${{ secrets.GPG_KEY_ID }} repo

          # Generate the .flatpakrepo file
          cat << EOF > repo/mixtapes.flatpakrepo
          [Flatpak Repo]
          Title=Mixtapes
          Url=https://${{ github.repository_owner }}.github.io/Muse/
          Homepage=https://github.com/${{ github.repository }}
          Comment=A modern, Linux-first YouTube Music player
          Description=A modern, Linux-first YouTube Music player
          Icon=https://raw.githubusercontent.com/${{ github.repository }}/main/assets/icons/com.pocoguy.Muse.svg
          GPGKey=$(gpg --export ${{ secrets.GPG_KEY_ID }} | base64 | tr -d '\n')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
