name: Build AppImage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  appimage:
    name: Build AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 \
            libglib2.0-dev libcairo2-dev python3-dev \
            fuse libfuse2 file

      - name: Install appimage-builder
        run: |
          ARCH=$(uname -m)
          sudo wget "https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-${ARCH}.AppImage" \
            -O /tmp/appimage-builder.AppImage
          sudo chmod +x /tmp/appimage-builder.AppImage
          # Extract rather than run as AppImage to avoid FUSE requirement
          cd /tmp && sudo /tmp/appimage-builder.AppImage --appimage-extract
          sudo mv /tmp/squashfs-root /opt/appimage-builder
          sudo ln -s /opt/appimage-builder/AppRun /usr/local/bin/appimage-builder

      - name: Prepare AppDir
        run: |
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          
          mkdir -p AppDir/usr/share/muse AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/scalable/apps

          cp -r src assets requirements.txt AppDir/usr/share/muse/
          cp com.pocoguy.Muse.desktop AppDir/usr/share/applications/
          cp assets/icons/hicolor/scalable/actions/compass2-symbolic.svg \
             AppDir/usr/share/icons/hicolor/scalable/apps/com.pocoguy.Muse.svg

          glib-compile-resources --sourcedir=. src/muse.gresource.xml \
            --target=AppDir/usr/share/muse/src/muse.gresource

          pip3 install -r requirements.txt \
            --prefix=AppDir/usr --no-cache-dir --break-system-packages
          pip3 install "yt-dlp[default]" \
            --prefix=AppDir/usr --no-cache-dir --break-system-packages

          cat > AppDir/usr/bin/muse << EOF
          #!/bin/bash
          export PYTHONPATH="\$APPDIR/usr/lib/python${PYTHON_VERSION}/site-packages:\$PYTHONPATH"
          cd "\$APPDIR/usr/share/muse"
          exec python3 src/main.py "\$@"
          EOF
          chmod +x AppDir/usr/bin/muse

      - name: Build AppImage
        run: |
          appimage-builder --recipe AppImageBuilder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixtapes-${{ matrix.arch }}-appimage
          path: "*.AppImage"