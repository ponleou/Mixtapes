name: Build AppImage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 libglib2.0-dev-bin libcairo2-dev python3-dev libfuse2 libgirepository1.0-dev libxml2-utils wget file binutils patch qemu-user-static gcc-aarch64-linux-gnu

      - name: Install appimage-builder
        run: |
          sudo pip3 install appimage-builder --break-system-packages

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/share/muse AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp -r src assets requirements.txt AppDir/usr/share/muse/
          cp com.pocoguy.Muse.desktop AppDir/usr/share/applications/
          cp assets/icons/hicolor/scalable/actions/compass2-symbolic.svg AppDir/usr/share/icons/hicolor/scalable/apps/com.pocoguy.Muse.svg

          # Install glib-compile-resources (host)
          sudo apt-get install -y libglib2.0-dev
          glib-compile-resources --sourcedir=. src/muse.gresource.xml --target=AppDir/usr/share/muse/src/muse.gresource

          # Detect Python version on host (Ubuntu 24.04 usually 3.12, but we'll bundle Sid packages)
          # We'll use a fixed version in the path for now or let Sid decide if we can.
          # But for the bundle, let's look at what Sid usually has (currently 3.12 or 3.13)
          # We'll stick to a dynamic check but execute it with sudo/pip as needed.
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          SITE_PACKAGES="AppDir/usr/lib/python${PYTHON_VERSION}/site-packages"
          mkdir -p "$SITE_PACKAGES"

          # Exclude PyGObject and mprisify from bulk install to avoid compilation
          grep -vE "PyGObject|mprisify" requirements.txt > requirements-pure.txt
          pip3 install -r requirements-pure.txt --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages

          # Install mprisify with --no-deps to avoid PyGObject source build (metadata might be needed if it fails)
          pip3 install "mprisify @ git+https://gitlab.com/zehkira/mprisify.git@v1.0.0" --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages --no-deps

          # yt-dlp is pure python, but we ensures it's in the target
          pip3 install "yt-dlp[default]" --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages

          # Debug: List bundled site-packages
          echo "Bundled site-packages contents:"
          ls -R "$SITE_PACKAGES"

          # Create C loader to satisfy appimage-builder ELF requirement
          cat > muse_loader.c << EOF
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <string.h>

          int main(int argc, char *argv[]) {
              char *appdir = getenv("APPDIR");
              if (!appdir) {
                  fprintf(stderr, "Error: APPDIR not set\n");
                  return 1;
              }

              // Set PYTHONPATH for both 3.12 and 3.13
              char pythonpath[4096];
              snprintf(pythonpath, sizeof(pythonpath), 
                       "%s/usr/share/muse:%s/usr/lib/python3.12/site-packages:%s/usr/lib/python3.13/site-packages:%s/usr/lib/python3/dist-packages",
                       appdir, appdir, appdir, appdir);
              setenv("PYTHONPATH", pythonpath, 1);

              // Set PYTHONHOME
              char pythonhome[1024];
              snprintf(pythonhome, sizeof(pythonhome), "%s/usr", appdir);
              setenv("PYTHONHOME", pythonhome, 1);

              // Work in the share/muse directory
              char workdir[1024];
              snprintf(workdir, sizeof(workdir), "%s/usr/share/muse", appdir);
              if (chdir(workdir) != 0) {
                  perror("chdir");
                  return 1;
              }

              // Exec python3 src/main.py
              char **new_argv = malloc((argc + 2) * sizeof(char *));
              new_argv[0] = "python3";
              new_argv[1] = "src/main.py";
              for (int i = 1; i < argc; i++) {
                  new_argv[i+1] = argv[i];
              }
              new_argv[argc + 1] = NULL;

              execvp("python3", new_argv);
              perror("execvp");
              return 1;
          }
          EOF

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            aarch64-linux-gnu-gcc muse_loader.c -o AppDir/usr/bin/muse
          else
            gcc muse_loader.c -o AppDir/usr/bin/muse
          fi
          chmod +x AppDir/usr/bin/muse

      - name: Adapt Architecture for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          sed -i 's/x86_64/aarch64/g' AppImageBuilder.yml
          sed -i 's/amd64/arm64/g' AppImageBuilder.yml

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          appimage-builder --recipe AppImageBuilder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixtapes-${{ matrix.arch }}-appimage
          path: "*.AppImage"
